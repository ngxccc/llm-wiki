name: "Senior AI Reviewer (Free Tier)"

# Trigger action when a Pull Request is opened or updated
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review-code:
    runs-on: ubuntu-latest
    # Need write permission to post comments on the PR
    permissions:
      pull-requests: write

    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch history to get the diff

      - name: Generate Diff and Send to Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Provided automatically by GitHub
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Get the code diff of the current PR
          git diff origin/main...HEAD > pr_diff.txt

          # Read diff into a variable (escape quotes for JSON)
          DIFF=$(cat pr_diff.txt | jq -R -s '.')

          # 2. Call Groq API using Llama 3 70B
          # Note: Using Node.js directly in the workflow for simplicity
          node -e "
            async function review() {
              const diff = $DIFF;
              if (diff.length < 10) return console.log('Empty diff, skip.');

              console.log('🤖 Sending code to Groq Llama3...');
              const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': \`Bearer process.env.GROQ_API_KEY\`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: 'llama3-70b-8192',
                  messages: [{
                    role: 'system',
                    content: 'You are a strict Senior Node.js/TypeScript Developer. Review the following git diff. Point out bugs, BigO performance issues, or bad practices. Be concise.'
                  }, {
                    role: 'user',
                    content: diff
                  }]
                })
              });

              const data = await response.json();
              const reviewText = data.choices[0].message.content;

              // 3. Post the result back to GitHub PR as a comment
              await fetch(\`https://api.github.com/repos/\${process.env.REPO}/issues/\${process.env.PR_NUMBER}/comments\`, {
                method: 'POST',
                headers: {
                  'Authorization': \`Bearer process.env.GH_TOKEN\`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ body: '### 🤖 AI Code Review:\\n' + reviewText })
              });
            }
            review();
          "

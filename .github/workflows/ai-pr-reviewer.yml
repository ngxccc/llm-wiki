name: "Senior AI Reviewer (Free Tier)"

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review-code:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Diff and Send to Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Trích xuất diff ra file text
          git diff origin/main...HEAD > pr_diff.txt

          # 2. Dùng Node.js chạy script "chống đạn"
          node -e "
            const fs = require('fs');

            async function review() {
              try {
                // ĐỌC FILE TRỰC TIẾP TỪ Ổ CỨNG (An toàn tuyệt đối)
                const diff = fs.readFileSync('pr_diff.txt', 'utf8');
                if (diff.length < 10) return console.log('✅ Diff quá ngắn, không cần review.');

                console.log('🤖 Đang gửi code cho Groq...');

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Authorization': \`Bearer \${process.env.GROQ_API_KEY}\`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile', // Cập nhật Model Llama mới nhất của Groq
                    messages: [{
                      role: 'system',
                      content: 'You are a strict Senior Node.js Developer. Review this git diff. Point out bugs or bad practices. Be concise.'
                    }, {
                      role: 'user',
                      content: diff
                    }]
                  })
                });

                const data = await response.json();

                // KIỂM TRA LỖI TỪ API GROQ TRƯỚC KHI ĐỌC DATA 🚨
                if (!response.ok) {
                  console.error('❌ Groq API Error:', JSON.stringify(data, null, 2));
                  process.exit(1); // Ép CI/CD báo đỏ (Failed)
                }

                const reviewText = data.choices[0].message.content;

                console.log('🤖 Đang comment kết quả lên GitHub PR...');

                const ghResponse = await fetch(\`https://api.github.com/repos/\${process.env.REPO}/issues/\${process.env.PR_NUMBER}/comments\`, {
                  method: 'POST',
                  headers: {
                    'Authorization': \`Bearer \${process.env.GH_TOKEN}\`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({ body: '### 🤖 AI Code Review:\\n' + reviewText })
                });

                if (!ghResponse.ok) {
                   const ghError = await ghResponse.json();
                   console.error('❌ GitHub API Error:', JSON.stringify(ghError, null, 2));
                   process.exit(1);
                }

                console.log('✅ Review hoàn tất!');

              } catch (error) {
                console.error('❌ Script Crash:', error.message);
                process.exit(1);
              }
            }
            review();
          "

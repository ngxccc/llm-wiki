name: "Senior AI Reviewer (Pro Max)"

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review-code:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Diff and Fetch Groq API
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Extract the raw code diff
          git diff origin/main...HEAD > pr_diff.txt

          # Run raw Node.js Fetch (Zero-dependency approach)
          node -e "
            const fs = require('fs');

            async function review() {
              try {
                const diff = fs.readFileSync('pr_diff.txt', 'utf8');
                // Check if diff is too small to review
                if (diff.length < 10) return console.log('✅ Diff is insignificant, skipping.');

                console.log('🤖 Calling Groq API (Llama 3.3 70B)...');

                // --- GROQ API CALL ---
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Authorization': \`Bearer \${process.env.GROQ_API_KEY}\`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: [
                      {
                        role: 'system',
                        content: 'You are a strict Senior Rust Developer. Review this git diff. Focus on security, Big O performance, and maintainability. Keep it concise.'
                      },
                      {
                        role: 'user',
                        content: diff
                      }
                    ],
                    temperature: 0.1, // Deterministic output to avoid hallucinations
                    max_completion_tokens: 1024,
                    top_p: 1
                  })
                });

                const data = await response.json();

                // Handle standard Groq API errors
                if (!response.ok) {
                  const errorMsg = data.error?.message || 'Unknown server error';
                  const errorCode = data.error?.code || 'N/A';
                  console.error(\`❌ Groq API Error [\${errorCode}]: \${errorMsg}\`);
                  process.exit(1);
                }

                const reviewText = data.choices[0].message.content;
                // ------------------------------------------

                console.log('🤖 Posting comment to PR...');

                // Push the review back to GitHub PR
                const ghResponse = await fetch(\`https://api.github.com/repos/\${process.env.REPO}/issues/\${process.env.PR_NUMBER}/comments\`, {
                  method: 'POST',
                  headers: {
                    'Authorization': \`Bearer \${process.env.GH_TOKEN}\`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({ body: '### 🤖 Review from Llama-3.3-70b:\n\n' + reviewText })
                });

                if (!ghResponse.ok) throw new Error('Failed to post comment on GitHub PR');

                console.log('✅ Done! Check the PR ASAP!');

              } catch (error) {
                console.error('❌ System Crash:', error.message);
                process.exit(1);
              }
            }

            // Execute the async function
            review();
          "
